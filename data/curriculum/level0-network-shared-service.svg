  <rect x="92" y="322" width="136" height="92" rx="18" fill="#ffffff" stroke="#c9d7e3" stroke-width="3"/>
  <rect x="112" y="342" width="96" height="52" rx="8" fill="#dff7ec"/>
  <text x="160" y="454" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#17212b">Tablet</text>
  <rect x="330" y="214" width="190" height="100" rx="18" fill="#071633"/>
  <rect x="356" y="245" width="28" height="28" rx="5" fill="#1769e0"/>
  <rect x="398" y="245" width="28" height="28" rx="5" fill="#23c08a"/>
  <rect x="440" y="245" width="28" height="28" rx="5" fill="#23c08a"/>
  <rect x="482" y="245" width="18" height="28" rx="5" fill="#7d8fa3"/>
  <text x="425" y="360" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#17212b">Switch</text>
  <rect x="620" y="214" width="118" height="100" rx="20" fill="#ffffff" stroke="#1769e0" stroke-width="4"/>
  <path d="M664 260h30m-15-15v30" stroke="#1769e0" stroke-width="8" stroke-linecap="round"/>
  <text x="679" y="360" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#17212b">Gateway</text>
