<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 900 520">
  <title id="title">Devices sharing a service through a network</title>
  <desc id="desc">A laptop and tablet connect to a switch, then a gateway, then a booking service.</desc>
