  <path d="M250 142C295 142 293 252 330 252" fill="none" stroke="#1769e0" stroke-width="8" stroke-linecap="round"/>
  <path d="M228 368C292 368 290 276 330 276" fill="none" stroke="#0f7a75" stroke-width="8" stroke-linecap="round"/>
  <path d="M520 264h100" fill="none" stroke="#1769e0" stroke-width="8" stroke-linecap="round"/>
  <path d="M738 214C764 184 778 166 790 154" fill="none" stroke="#1769e0" stroke-width="8" stroke-linecap="round"/>
  <circle cx="290" cy="252" r="12" fill="#1769e0"/>
  <circle cx="292" cy="276" r="12" fill="#0f7a75"/>
  <circle cx="570" cy="264" r="12" fill="#1769e0"/>
