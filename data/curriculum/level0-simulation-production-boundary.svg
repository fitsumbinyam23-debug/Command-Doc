<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 900 520">
  <title id="title">Simulation and production boundary</title>
  <desc id="desc">A local simulated switch is separated from a production network by a safety boundary.</desc>
  <rect width="900" height="520" rx="24" fill="#f4f8fb"/>
  <rect x="54" y="112" width="330" height="300" rx="24" fill="#ffffff" stroke="#0f7a75" stroke-width="4"/>
  <text x="219" y="158" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="800" fill="#0f5553">Local simulation</text>
  <rect x="106" y="220" width="226" height="96" rx="18" fill="#071633"/>
  <rect x="134" y="251" width="24" height="24" rx="5" fill="#23c08a"/>
  <rect x="172" y="251" width="24" height="24" rx="5" fill="#23c08a"/>
  <rect x="210" y="251" width="24" height="24" rx="5" fill="#1769e0"/>
  <rect x="248" y="251" width="24" height="24" rx="5" fill="#7d8fa3"/>
  <text x="219" y="356" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#5c6b7a">Safe practice sandbox</text>
  <line x1="450" y1="96" x2="450" y2="424" stroke="#b3261e" stroke-width="8" stroke-dasharray="18 16"/>
  <rect x="390" y="220" width="120" height="74" rx="12" fill="#fff5f5" stroke="#b3261e" stroke-width="3"/>
  <text x="450" y="250" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#b3261e">Safety</text>
  <text x="450" y="276" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#b3261e">boundary</text>
  <rect x="516" y="112" width="330" height="300" rx="24" fill="#ffffff" stroke="#b3261e" stroke-width="4"/>
  <text x="681" y="158" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="800" fill="#b3261e">Production network</text>
  <rect x="570" y="224" width="220" height="88" rx="18" fill="#17212b"/>
  <rect x="596" y="252" width="24" height="24" rx="5" fill="#23c08a"/>
  <rect x="634" y="252" width="24" height="24" rx="5" fill="#f0c34e"/>
  <rect x="672" y="252" width="24" height="24" rx="5" fill="#b3261e"/>
  <rect x="710" y="252" width="24" height="24" rx="5" fill="#7d8fa3"/>
  <text x="681" y="356" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#5c6b7a">Real users and services</text>
  <path d="M336 268h78" stroke="#0f7a75" stroke-width="8" stroke-linecap="round"/>
  <path d="M486 268h78" stroke="#b3261e" stroke-width="8" stroke-linecap="round"/>
  <text x="450" y="72" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800" fill="#0f5553">Practice locally before production work exists</text>
  <text x="450" y="464" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#5c6b7a">Simulation teaches order. Production changes need approval, rollback, and verification.</text>
</svg>
