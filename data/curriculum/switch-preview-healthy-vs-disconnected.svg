<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 960 520">
  <title id="title">Healthy link versus disconnected link preview</title>
  <desc id="desc">A side-by-side comparison of a healthy connected switch link and a disconnected link.</desc>
  <rect width="960" height="520" rx="28" fill="#f5f8fb"/>
  <rect x="80" y="126" width="360" height="280" rx="24" fill="#ffffff" stroke="#9fd0c4" stroke-width="4"/>
  <text x="260" y="174" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="800" fill="#0f5553">Healthy link</text>
  <rect x="132" y="236" width="190" height="76" rx="16" fill="#071633"/>
  <rect x="166" y="258" width="42" height="34" rx="6" fill="#101f3a" stroke="#c7d6e7" stroke-width="3"/>
  <circle cx="187" cy="246" r="7" fill="#23c08a"/>
  <path d="M208 276h124c36 0 44 32 82 32" fill="none" stroke="#23c08a" stroke-width="8" stroke-linecap="round"/>
  <text x="260" y="352" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#5c6b7a">LED on, cable seated, endpoint reachable.</text>
  <rect x="520" y="126" width="360" height="280" rx="24" fill="#ffffff" stroke="#f0c36a" stroke-width="4"/>
  <text x="700" y="174" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="800" fill="#7b4d00">Disconnected</text>
  <rect x="572" y="236" width="190" height="76" rx="16" fill="#071633"/>
  <rect x="606" y="258" width="42" height="34" rx="6" fill="#101f3a" stroke="#c7d6e7" stroke-width="3"/>
  <circle cx="627" cy="246" r="7" fill="#7d8fa3"/>
  <path d="M648 276h70" fill="none" stroke="#b3261e" stroke-width="8" stroke-linecap="round"/>
  <path d="M742 262l28 28m0-28l-28 28" stroke="#b3261e" stroke-width="8" stroke-linecap="round"/>
  <text x="700" y="352" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#5c6b7a">LED off, cable or endpoint needs evidence.</text>
  <text x="480" y="64" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800" fill="#0f5553">Link evidence preview</text>
  <text x="480" y="462" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#5c6b7a">Future lessons must connect visual evidence to safe read-only checks before any change.</text>
</svg>
