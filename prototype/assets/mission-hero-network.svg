<svg xmlns="http://www.w3.org/2000/svg" width="620" height="410" viewBox="0 0 620 410" role="img" aria-labelledby="title desc">
  <title id="title">Mission network visual</title>
  <desc id="desc">A large original network switch connecting a laptop, access point, service, and gateway with glowing data paths.</desc>
  <defs>
    <linearGradient id="switchBody" x1="128" y1="142" x2="512" y2="288" gradientUnits="userSpaceOnUse">
      <stop stop-color="#18253C"/>
      <stop offset="0.55" stop-color="#0D1728"/>
      <stop offset="1" stop-color="#050C18"/>
    </linearGradient>
    <linearGradient id="portGlow" x1="146" y1="220" x2="474" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10C6C3"/>
      <stop offset="1" stop-color="#2086FF"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0B66F0"/>
      <stop offset="1" stop-color="#10C6C3"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#010713" flood-opacity="0.48"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="40" y="38" width="540" height="330" rx="18" fill="#061A3E" opacity="0.1"/>
  <path d="M98 302C142 354 255 378 352 354c86-21 147-78 168-153 18-64 3-111-45-140" fill="none" stroke="#1D7DF0" stroke-width="2" opacity="0.22"/>
  <path d="M102 104c82-53 204-57 286-16 90 45 123 141 77 218" fill="none" stroke="#10C6C3" stroke-width="2" opacity="0.16"/>

  <g filter="url(#softShadow)">
    <path d="M132 160h344c18 0 32 14 32 32v74c0 18-14 32-32 32H132c-18 0-32-14-32-32v-74c0-18 14-32 32-32Z" fill="url(#switchBody)"/>
    <path d="M132 160h344c18 0 32 14 32 32v10H100v-10c0-18 14-32 32-32Z" fill="#23314A" opacity="0.86"/>
    <rect x="120" y="190" width="368" height="86" rx="12" fill="#0A1322" stroke="#38516E" stroke-width="2"/>
    <g fill="#D9F7FF">
      <rect x="144" y="209" width="28" height="22" rx="4"/>
