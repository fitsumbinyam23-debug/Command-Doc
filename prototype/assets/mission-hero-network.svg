      <rect x="292" y="209" width="28" height="22" rx="4"/>
      <rect x="329" y="209" width="28" height="22" rx="4"/>
      <rect x="366" y="209" width="28" height="22" rx="4"/>
      <rect x="403" y="209" width="28" height="22" rx="4"/>
      <rect x="440" y="209" width="28" height="22" rx="4"/>
    </g>
    <g fill="#0F1D33">
      <rect x="149" y="214" width="18" height="12" rx="2"/>
      <rect x="186" y="214" width="18" height="12" rx="2"/>
      <rect x="223" y="214" width="18" height="12" rx="2"/>
      <rect x="260" y="214" width="18" height="12" rx="2"/>
      <rect x="297" y="214" width="18" height="12" rx="2"/>
      <rect x="334" y="214" width="18" height="12" rx="2"/>
