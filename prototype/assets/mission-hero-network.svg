    <path d="M144 249h324" stroke="url(#portGlow)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <g fill="#73F4EF" filter="url(#glow)">
      <circle cx="158" cy="250" r="4"/>
      <circle cx="232" cy="250" r="4"/>
      <circle cx="306" cy="250" r="4"/>
      <circle cx="380" cy="250" r="4"/>
      <circle cx="454" cy="250" r="4"/>
    </g>
  </g>

  <g fill="none" stroke="#66F3F1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
