<svg xmlns="http://www.w3.org/2000/svg" width="620" height="410" viewBox="0 0 620 410" role="img" aria-labelledby="title desc">
  <title id="title">Vendor-neutral physical network scene</title>
  <desc id="desc">A generic physical switch front panel with clear port LEDs, patch cables, an endpoint, a gateway, and an access point.</desc>
  <defs>
    <linearGradient id="switchTop" x1="124" y1="146" x2="512" y2="196" gradientUnits="userSpaceOnUse">
      <stop stop-color="#334966"/>
      <stop offset="0.48" stop-color="#17283F"/>
      <stop offset="1" stop-color="#0A1323"/>
    </linearGradient>
    <linearGradient id="switchFace" x1="104" y1="194" x2="514" y2="302" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D304A"/>
      <stop offset="0.46" stop-color="#0B1728"/>
      <stop offset="1" stop-color="#050A13"/>
    </linearGradient>
    <linearGradient id="frontPlate" x1="126" y1="208" x2="492" y2="274" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E2038"/>
      <stop offset="1" stop-color="#040914"/>
    </linearGradient>
    <linearGradient id="portFace" x1="144" y1="222" x2="362" y2="248" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ECFBFF"/>
      <stop offset="1" stop-color="#A9D2E9"/>
    </linearGradient>
    <linearGradient id="cableBlue" x1="102" y1="258" x2="544" y2="326" gradientUnits="userSpaceOnUse">
      <stop stop-color="#13D8D1"/>
      <stop offset="0.52" stop-color="#168CFF"/>
      <stop offset="1" stop-color="#73F4EF"/>
    </linearGradient>
    <linearGradient id="deviceFill" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0E3D7D"/>
      <stop offset="1" stop-color="#071D49"/>
    </linearGradient>
    <filter id="deviceShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#010713" flood-opacity="0.46"/>
    </filter>
    <filter id="smallGlow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="2.1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

